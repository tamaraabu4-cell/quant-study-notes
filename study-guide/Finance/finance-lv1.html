<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance LV I — Study Notes</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f8f7f4;
    color: #1a1a18;
    font-size: 14px;
    line-height: 1.6;
    padding: 16px;
    min-height: 100vh;
  }

  /* ── colour tokens ── */
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f1efe8;
    --bg-tertiary: #f8f7f4;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --border-light: rgba(0,0,0,0.1);
    --border-med: rgba(0,0,0,0.18);
    --green-bg: #E1F5EE;
    --green-dark: #085041;
    --green-mid: #0F6E56;
    --green-accent: #1D9E75;
    --purple-bg: #EEEDFE;
    --purple-dark: #26215C;
    --purple-mid: #534AB7;
    --amber-bg: #FAEEDA;
    --amber-dark: #412402;
    --amber-mid: #854F0B;
    --blue-bg: #E6F1FB;
    --blue-dark: #042C53;
    --blue-mid: #185FA5;
    --red-bg: #FCEBEB;
    --red-dark: #501313;
    --red-mid: #A32D2D;
    --coral-bg: #FAECE7;
    --coral-dark: #4A1B0C;
    --coral-mid: #993C1D;
    --r-sm: 6px;
    --r-md: 8px;
    --r-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1918; color: #e8e6df; }
    :root {
      --bg-primary: #242320;
      --bg-secondary: #2c2b28;
      --bg-tertiary: #1a1918;
      --text-primary: #e8e6df;
      --text-secondary: #a0a098;
      --text-tertiary: #6e6d67;
      --border-light: rgba(255,255,255,0.08);
      --border-med: rgba(255,255,255,0.14);
      --green-bg: #04342C;
      --green-dark: #9FE1CB;
      --green-mid: #5DCAA5;
      --purple-bg: #26215C;
      --purple-dark: #CECBF6;
      --purple-mid: #AFA9EC;
      --amber-bg: #412402;
      --amber-dark: #FAC775;
      --amber-mid: #EF9F27;
      --blue-bg: #042C53;
      --blue-dark: #B5D4F4;
      --blue-mid: #85B7EB;
      --red-bg: #501313;
      --red-dark: #F7C1C1;
      --red-mid: #F09595;
      --coral-bg: #4A1B0C;
      --coral-dark: #F5C4B3;
      --coral-mid: #F0997B;
    }
  }

  /* ── shell ── */
  .shell {
    max-width: 860px;
    margin: 0 auto;
    background: var(--bg-primary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--r-lg);
    overflow: hidden;
  }

  .header {
    background: var(--bg-secondary);
    padding: 10px 16px;
    border-bottom: 0.5px solid var(--border-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header-title { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .header-sub { font-size: 11px; color: var(--text-tertiary); }

  .progress-row {
    display: flex;
    gap: 6px;
    padding: 10px 16px 6px;
    background: var(--bg-secondary);
    border-bottom: 0.5px solid var(--border-light);
    flex-wrap: wrap;
  }
  .prog-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.15s;
    border: none;
    padding: 0;
  }
  .prog-dot:hover { transform: scale(1.3); }

  .body { display: flex; min-height: 560px; }

  /* ── sidebar ── */
  .sidebar {
    width: 168px;
    flex-shrink: 0;
    border-right: 0.5px solid var(--border-light);
    padding: 10px 0;
    background: var(--bg-primary);
  }
  .nav-section {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-tertiary);
    padding: 8px 14px 4px;
    font-weight: 500;
  }
  .nav-item {
    padding: 7px 14px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text-secondary);
    line-height: 1.4;
    border-left: 2px solid transparent;
    transition: background 0.1s;
  }
  .nav-item:hover { background: var(--bg-secondary); color: var(--text-primary); }
  .nav-item.active {
    color: var(--text-primary);
    font-weight: 500;
    border-left: 2px solid var(--green-accent);
    background: var(--bg-secondary);
  }

  /* ── content ── */
  .content {
    flex: 1;
    padding: 20px 24px;
    overflow-y: auto;
    max-height: 660px;
  }

  .topic-title { font-size: 18px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
  .topic-badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 9px;
    border-radius: 20px;
    background: var(--green-bg);
    color: var(--green-mid);
    font-weight: 500;
    margin-bottom: 14px;
  }
  .topic-badge.pending { background: var(--amber-bg); color: var(--amber-mid); }

  .eli5 {
    background: var(--bg-secondary);
    border-left: 3px solid #EF9F27;
    border-radius: 0 var(--r-md) var(--r-md) 0;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--text-primary);
    line-height: 1.65;
  }
  .eli5-label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--amber-mid);
    margin-bottom: 5px;
  }

  .section-h {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    margin: 18px 0 8px;
    padding-bottom: 4px;
    border-bottom: 0.5px solid var(--border-light);
  }

  /* ── flashcards ── */
  .fc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 8px; margin-bottom: 14px; }
  .fc {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--r-md);
    padding: 12px;
  }
  .fc-front { font-size: 12px; font-weight: 500; color: var(--text-primary); margin-bottom: 5px; }
  .fc-back { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .fc-eg {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 7px;
    padding-top: 7px;
    border-top: 0.5px solid var(--border-light);
    font-style: italic;
  }

  /* ── formula ── */
  .f-label { font-size: 11px; color: var(--text-tertiary); text-align: center; margin-bottom: 4px; font-style: italic; }
  .f-box {
    background: var(--bg-secondary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--r-md);
    padding: 14px 16px;
    margin-bottom: 10px;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    text-align: center;
    color: var(--text-primary);
    letter-spacing: 0.02em;
  }

  .var-table { width: 100%; font-size: 12px; border-collapse: collapse; margin-bottom: 14px; }
  .var-table td { padding: 5px 8px; border-bottom: 0.5px solid var(--border-light); vertical-align: top; }
  .var-table td:first-child { font-family: monospace; font-weight: 500; color: var(--blue-mid); width: 55px; }
  .var-table td:last-child { color: var(--text-secondary); }

  /* ── timeline ── */
  .timeline { display: flex; align-items: center; margin: 16px 0; overflow-x: auto; padding-bottom: 4px; }
  .tl-node { display: flex; flex-direction: column; align-items: center; min-width: 72px; }
  .tl-circle {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500;
  }
  .tl-label { font-size: 10px; color: var(--text-tertiary); margin-top: 4px; }
  .tl-amt { font-size: 13px; font-weight: 500; margin-top: 2px; }
  .tl-line { flex: 1; height: 2px; background: var(--border-med); margin-bottom: 26px; min-width: 20px; }
  .tl-arrow { font-size: 16px; color: var(--text-tertiary); margin-bottom: 26px; }

  /* ── calculator ── */
  .calc-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .calc-lbl { font-size: 12px; color: var(--text-secondary); min-width: 100px; }
  .calc-val { font-size: 13px; font-weight: 500; color: var(--text-primary); min-width: 68px; text-align: right; }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--border-med);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--green-accent);
    cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--green-accent);
    border: none;
    cursor: pointer;
  }

  .result-box {
    background: var(--green-bg);
    border-radius: var(--r-md);
    padding: 12px 16px;
    margin-top: 10px;
  }
  .result-lbl { font-size: 11px; color: var(--green-mid); margin-bottom: 2px; }
  .result-val { font-size: 24px; font-weight: 500; color: var(--green-dark); }

  .results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
  .rg-box { border-radius: var(--r-md); padding: 10px 12px; }
  .rg-lbl { font-size: 11px; margin-bottom: 2px; }
  .rg-val { font-size: 17px; font-weight: 500; }

  /* ── comparison table ── */
  .cmp-table { width: 100%; font-size: 12px; border-collapse: collapse; margin: 10px 0 14px; }
  .cmp-table th {
    padding: 6px 10px;
    background: var(--bg-secondary);
    font-weight: 500; font-size: 11px;
    text-align: left;
    border-bottom: 0.5px solid var(--border-med);
    color: var(--text-secondary);
  }
  .cmp-table td { padding: 6px 10px; border-bottom: 0.5px solid var(--border-light); color: var(--text-primary); }
  .cmp-table tr:last-child td { border-bottom: none; }
  .cmp-table .hi td { background: var(--green-bg); font-weight: 500; color: var(--green-dark) !important; }

  /* ── risk cards ── */
  .risk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin: 10px 0; }
  .risk-card { border-radius: var(--r-md); padding: 10px 12px; }
  .risk-title { font-size: 12px; font-weight: 500; margin-bottom: 4px; }
  .risk-body { font-size: 11px; line-height: 1.5; }

  /* ── quant box ── */
  .quant-box {
    background: var(--bg-secondary);
    border-radius: var(--r-md);
    padding: 10px 14px;
    margin-top: 14px;
  }
  .quant-lbl {
    font-size: 10px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--purple-mid); margin-bottom: 6px;
  }
  .quant-tag {
    display: inline-block;
    font-size: 11px; padding: 2px 8px;
    border-radius: 4px;
    background: var(--purple-bg);
    color: var(--purple-mid);
    margin: 2px;
  }
  .quant-body { font-size: 12px; color: var(--text-secondary); line-height: 1.55; margin-bottom: 8px; }

  /* ── coming soon ── */
  .coming { text-align: center; padding: 32px 16px; }
  .coming-icon { font-size: 40px; margin-bottom: 12px; }
  .coming-title { font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px; }
  .coming-body { font-size: 13px; color: var(--text-secondary); max-width: 260px; margin: 0 auto 16px; line-height: 1.6; }
  .coming-btn {
    padding: 7px 16px;
    font-size: 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border-med);
    background: transparent;
    cursor: pointer;
    color: var(--text-secondary);
    font-family: inherit;
  }
  .coming-btn:hover { background: var(--bg-secondary); }

  .note { font-size: 12px; color: var(--text-secondary); line-height: 1.6; margin: 0 0 10px; }
</style>
</head>
<body>

<div class="shell">

  <div class="header">
    <div>
      <div class="header-title">Finance — Level I: Foundations of Valuation</div>
      <div class="header-sub">Your personal quant study notes</div>
    </div>
    <div id="progress-text" style="font-size:11px;color:var(--text-tertiary)">Topic 1 of 7</div>
  </div>

  <div class="progress-row" id="prog-dots"></div>

  <div class="body">
    <div class="sidebar">
      <div class="nav-section">LV I Topics</div>
      <div class="nav-item active" data-t="0">Time value of money</div>
      <div class="nav-item" data-t="1">Compounding methods</div>
      <div class="nav-item" data-t="2">Effective annual rate</div>
      <div class="nav-item" data-t="3">NPV</div>
      <div class="nav-item" data-t="4">IRR</div>
      <div class="nav-item" data-t="5">Annuities &amp; perpetuities</div>
      <div class="nav-item" data-t="6">Portfolio risk types</div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
const topics = [
{
  title: "Time value of money",
  badge: "core",
  eli5: "Imagine your mate owes you £100. Would you rather he paid you back today, or in 5 years? Today — obviously. Because you could invest that £100 now and have MORE than £100 in 5 years. That's the entire idea: money now is worth more than the same money later.",
  html: `
    <div class="section-h">The core idea</div>
    <p class="note">Money has a time dimension. £100 today is NOT the same as £100 in one year — because today's £100 can be invested and grow. This idea underpins almost all of finance.</p>
    <div class="timeline">
      <div class="tl-node">
        <div class="tl-circle" style="background:#E1F5EE;color:#085041">Now</div>
        <div class="tl-label">Today</div>
        <div class="tl-amt" style="color:#085041">£100</div>
      </div>
      <div class="tl-line"></div><div class="tl-arrow">→</div><div class="tl-line"></div>
      <div class="tl-node">
        <div class="tl-circle" style="background:#EEEDFE;color:#26215C">+1yr</div>
        <div class="tl-label">Year 1</div>
        <div class="tl-amt" style="color:#534AB7">£110</div>
      </div>
      <div class="tl-line"></div><div class="tl-arrow">→</div><div class="tl-line"></div>
      <div class="tl-node">
        <div class="tl-circle" style="background:#FAEEDA;color:#412402">+2yr</div>
        <div class="tl-label">Year 2</div>
        <div class="tl-amt" style="color:#854F0B">£121</div>
      </div>
    </div>
    <p style="font-size:11px;color:var(--text-tertiary);text-align:center;margin:0 0 14px">£100 invested at 10% per year</p>

    <div class="section-h">Two directions</div>
    <div class="fc-grid">
      <div class="fc">
        <div class="fc-front">Future Value (FV)</div>
        <div class="fc-back">How much does money grow to? You move money FORWARD in time by applying growth.</div>
        <div class="fc-eg">£100 today at 10% → £110 in 1 year</div>
      </div>
      <div class="fc">
        <div class="fc-front">Present Value (PV)</div>
        <div class="fc-back">What is future money worth TODAY? You bring money BACK in time by discounting it.</div>
        <div class="fc-eg">£110 in 1 year at 10% → £100 today</div>
      </div>
    </div>

    <div class="section-h">The formulas</div>
    <div class="f-label">Future Value — moving money forward</div>
    <div class="f-box">FV = PV × (1 + r)ⁿ</div>
    <div class="f-label">Present Value — discounting back to today</div>
    <div class="f-box">PV = FV ÷ (1 + r)ⁿ</div>
    <table class="var-table">
      <tr><td>PV</td><td>Present value — the money today</td></tr>
      <tr><td>FV</td><td>Future value — the money in the future</td></tr>
      <tr><td>r</td><td>Interest / discount rate per period</td></tr>
      <tr><td>n</td><td>Number of periods (years, months...)</td></tr>
    </table>

    <div class="section-h">Live calculator — drag to explore</div>
    <div class="calc-row">
      <span class="calc-lbl">Present value (£)</span>
      <input type="range" min="100" max="10000" step="100" value="1000" id="tvm-pv">
      <span class="calc-val" id="tvm-pv-v">£1,000</span>
    </div>
    <div class="calc-row">
      <span class="calc-lbl">Rate (% / year)</span>
      <input type="range" min="1" max="20" step="0.5" value="7" id="tvm-r">
      <span class="calc-val" id="tvm-r-v">7%</span>
    </div>
    <div class="calc-row">
      <span class="calc-lbl">Years</span>
      <input type="range" min="1" max="30" step="1" value="10" id="tvm-n">
      <span class="calc-val" id="tvm-n-v">10 yrs</span>
    </div>
    <div class="result-box">
      <div class="result-lbl">Future Value</div>
      <div class="result-val" id="tvm-result">—</div>
    </div>

    <div class="section-h">Why quants care</div>
    <div class="quant-box">
      <div class="quant-lbl">Used across quant finance</div>
      <span class="quant-tag">Bond pricing</span>
      <span class="quant-tag">Option pricing</span>
      <span class="quant-tag">DCF models</span>
      <span class="quant-tag">Risk-neutral valuation</span>
      <span class="quant-tag">Black-Scholes</span>
      <span class="quant-tag">Portfolio optimisation</span>
    </div>`
},
{
  title: "Compounding methods",
  badge: "core",
  eli5: "Compounding means you earn interest on your interest. Like a snowball rolling downhill — it gets bigger faster the bigger it gets. The more frequently interest is added (monthly vs yearly), the faster money grows. At the extreme — adding interest every single instant — you get continuous compounding, which is the mathematical limit.",
  html: `
    <div class="section-h">Three types compared</div>
    <table class="cmp-table">
      <thead><tr><th>Type</th><th>Formula</th><th>£100 at 12%, 1 year</th></tr></thead>
      <tbody>
        <tr><td>Annual (once/yr)</td><td style="font-family:monospace;font-size:11px">FV = PV(1+r)ⁿ</td><td>£112.00</td></tr>
        <tr><td>Monthly (12×/yr)</td><td style="font-family:monospace;font-size:11px">FV = PV(1+r/m)^mn</td><td>£112.68</td></tr>
        <tr class="hi"><td>Continuous (∞)</td><td style="font-family:monospace;font-size:11px">FV = PV × eʳᵗ</td><td>£112.75 (maximum)</td></tr>
      </tbody>
    </table>

    <div class="section-h">The formulas</div>
    <div class="f-label">Periodic compounding (m times per year)</div>
    <div class="f-box">FV = PV × (1 + r/m)^(m×n)</div>
    <div class="f-label">Continuous compounding (the limit as m → ∞)</div>
    <div class="f-box">FV = PV × eʳᵗ</div>
    <table class="var-table">
      <tr><td>m</td><td>Compounding periods per year (12 = monthly, 365 = daily)</td></tr>
      <tr><td>e</td><td>Euler's number ≈ 2.718 — the base of natural logarithms</td></tr>
      <tr><td>r</td><td>Annual rate</td></tr>
      <tr><td>t</td><td>Time in years</td></tr>
    </table>

    <div class="section-h">Live comparison calculator</div>
    <div class="calc-row">
      <span class="calc-lbl">Principal (£)</span>
      <input type="range" min="100" max="5000" step="100" value="1000" id="cp-pv">
      <span class="calc-val" id="cp-pv-v">£1,000</span>
    </div>
    <div class="calc-row">
      <span class="calc-lbl">Rate (%)</span>
      <input type="range" min="1" max="20" step="0.5" value="12" id="cp-r">
      <span class="calc-val" id="cp-r-v">12%</span>
    </div>
    <div class="calc-row">
      <span class="calc-lbl">Years</span>
      <input type="range" min="1" max="20" step="1" value="5" id="cp-n">
      <span class="calc-val" id="cp-n-v">5</span>
    </div>
    <div class="results-grid">
      <div class="rg-box" style="background:var(--blue-bg)">
        <div class="rg-lbl" style="color:var(--blue-mid)">Annual</div>
        <div class="rg-val" style="color:var(--blue-dark)" id="cp-ann">—</div>
      </div>
      <div class="rg-box" style="background:var(--purple-bg)">
        <div class="rg-lbl" style="color:var(--purple-mid)">Monthly</div>
        <div class="rg-val" style="color:var(--purple-dark)" id="cp-mon">—</div>
      </div>
      <div class="rg-box" style="background:var(--green-bg)">
        <div class="rg-lbl" style="color:var(--green-mid)">Continuous</div>
        <div class="rg-val" style="color:var(--green-dark)" id="cp-con">—</div>
      </div>
    </div>

    <div class="section-h">Why quants love continuous compounding</div>
    <div class="quant-box">
      <div class="quant-lbl">Quant uses</div>
      <p class="quant-body">Continuous compounding makes the maths clean — calculus works perfectly with eˣ. Log returns (ln(P₁/P₀)) are continuous returns. Black-Scholes and stochastic calculus are both built on this foundation.</p>
      <span class="quant-tag">Log returns</span>
      <span class="quant-tag">Black-Scholes</span>
      <span class="quant-tag">Stochastic calculus</span>
      <span class="quant-tag">Derivatives pricing</span>
    </div>`
},
{
  title: "Effective Annual Rate (EAR)",
  badge: "core",
  eli5: "Two banks both advertise '10% interest'. One compounds yearly, one monthly. They sound the same but they're NOT — you get more money from the monthly one. EAR converts ANY rate into 'what does this actually give you over a full year?' so you can compare apples to apples.",
  html: `
    <div class="section-h">The problem EAR solves</div>
    <div class="fc-grid">

    <table class="var-table">

let current = 0;

function fmt(n) { return '£' + Math.round(n).toLocaleString(); }

function renderDots() {
  const el = document.getElementById('prog-dots');
  el.innerHTML = topics.map((t,i) =>
    `<button class="prog-dot" title="${t.title}" style="background:${i===current?'#1D9E75':i<current?'#9FE1CB':'#D3D1C7'}" onclick="go(${i})"></button>`
  ).join('');
}

function go(i) {
  current = i;
  document.querySelectorAll('.nav-item').forEach((n,idx) => n.classList.toggle('active', idx===i));
  document.getElementById('progress-text').textContent = `Topic ${i+1} of ${topics.length}`;
  renderDots();
  const t = topics[i];
  const badgeCls = t.badge === 'core' ? '' : ' pending';
  const badgeTxt = t.badge === 'core' ? 'Core concept' : 'In progress';
  document.getElementById('content').innerHTML = `
    <div class="topic-title">${t.title}</div>
    <span class="topic-badge${badgeCls}">${badgeTxt}</span>
    <div class="eli5"><div class="eli5-label">ELI5 — plain English first</div>${t.eli5}</div>
    ${t.html}`;
  bindCalcs();
}

function bindCalcs() {
  // TVM
  const tvPv=document.getElementById('tvm-pv'), tvR=document.getElementById('tvm-r'), tvN=document.getElementById('tvm-n');
  if(tvPv){
    function upTVM(){
      const pv=+tvPv.value, r=+tvR.value/100, n=+tvN.value;
      document.getElementById('tvm-pv-v').textContent='£'+pv.toLocaleString();
      document.getElementById('tvm-r-v').textContent=tvR.value+'%';
      document.getElementById('tvm-n-v').textContent=n+' yrs';
      document.getElementById('tvm-result').textContent=fmt(pv*Math.pow(1+r,n));
    }
    [tvPv,tvR,tvN].forEach(e=>e.addEventListener('input',upTVM)); upTVM();
  }
  // Compounding
  const cpPv=document.getElementById('cp-pv'), cpR=document.getElementById('cp-r'), cpN=document.getElementById('cp-n');
  if(cpPv){
    function upCP(){
      const pv=+cpPv.value, r=+cpR.value/100, n=+cpN.value;
      document.getElementById('cp-pv-v').textContent='£'+pv.toLocaleString();
      document.getElementById('cp-r-v').textContent=cpR.value+'%';
      document.getElementById('cp-n-v').textContent=n;
      document.getElementById('cp-ann').textContent=fmt(pv*Math.pow(1+r,n));
      document.getElementById('cp-mon').textContent=fmt(pv*Math.pow(1+r/12,12*n));
      document.getElementById('cp-con').textContent=fmt(pv*Math.exp(r*n));
    }
    [cpPv,cpR,cpN].forEach(e=>e.addEventListener('input',upCP)); upCP();
  }
  // EAR
  const earR=document.getElementById('ear-r');
  if(earR){
    function upEAR(){
      const r=+earR.value/100;
      document.getElementById('ear-r-v').textContent=earR.value+'%';
      const rows=[{l:'Annually',m:1},{l:'Quarterly',m:4},{l:'Monthly',m:12},{l:'Daily',m:365},{l:'Continuous',m:Infinity}];
      document.getElementById('ear-tbody').innerHTML=rows.map(row=>{
        const ear=row.m===Infinity?Math.exp(r)-1:Math.pow(1+r/row.m,row.m)-1;
        const hi=row.m===Infinity;
        return`<tr${hi?' class="hi"':''}><td>${row.l}</td><td>${row.m===Infinity?'∞':row.m}</td><td>${(ear*100).toFixed(4)}%</td></tr>`;
      }).join('');
    }
    earR.addEventListener('input',upEAR); upEAR();
  }
}

document.querySelectorAll('.nav-item').forEach((el,i)=>el.addEventListener('click',()=>go(i)));
renderDots();
go(0);
</script>
