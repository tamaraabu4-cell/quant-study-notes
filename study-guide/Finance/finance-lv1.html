/* ── 0  TIME VALUE OF MONEY ─────────────────────────── */
{
  title: "Time value of money",
  eli5: "Imagine your mate owes you £100. Would you rather he paid you back TODAY or in 5 years? Today — obviously. Because you could invest that £100 right now and it would grow to MORE than £100 in 5 years. That single idea — money now is worth more than the same money later — is the foundation of almost everything in finance.",
  html: `
  <div class="sh">The core idea</div>
  <p style="font-size:14px;color:var(--subtle);line-height:1.7;margin-bottom:18px">Money has a time dimension. £100 today is NOT the same as £100 in one year — because today's money can be invested and grow. Every financial decision that involves future cash flows uses this idea.</p>

  <div class="timeline">
    <div class="tl-node">
      <div class="tl-circle" style="background:#ecfdf5;color:#065f46">Now</div>
      <div class="tl-lbl">Today</div>
      <div class="tl-val" style="color:#065f46">£100</div>
    </div>
    <div class="tl-line"></div><div class="tl-arr">→</div><div class="tl-line"></div>
    <div class="tl-node">
      <div class="tl-circle" style="background:#f5f3ff;color:#4c1d95">+1yr</div>
      <div class="tl-lbl">Year 1</div>
      <div class="tl-val" style="color:#6d28d9">£110</div>
    </div>
    <div class="tl-line"></div><div class="tl-arr">→</div><div class="tl-line"></div>
    <div class="tl-node">
      <div class="tl-circle" style="background:#fffbeb;color:#78350f">+2yr</div>
      <div class="tl-lbl">Year 2</div>
      <div class="tl-val" style="color:#92400e">£121</div>
    </div>
    <div class="tl-line"></div><div class="tl-arr">→</div><div class="tl-line"></div>
    <div class="tl-node">
      <div class="tl-circle" style="background:#fff1f2;color:#881337">+3yr</div>
      <div class="tl-lbl">Year 3</div>
      <div class="tl-val" style="color:#9f1239">£133</div>
    </div>
  </div>
  <p style="font-size:11px;color:var(--subtle);text-align:center;margin:0 0 24px">£100 at 10% annual rate — notice how growth accelerates each year</p>

  <div class="sh">Two directions money moves in time</div>
  <div class="fc-grid">
    <div class="fc">
      <div class="fc-term">Future Value (FV)</div>
      <div class="fc-def">How much does money today grow to? You move money FORWARD in time by applying a growth rate.</div>
      <div class="fc-eg">£100 today at 10% → £110 in 1 year</div>
    </div>
    <div class="fc">
      <div class="fc-term">Present Value (PV)</div>
      <div class="fc-def">What is future money worth TODAY? You move money BACKWARD in time by discounting it.</div>
      <div class="fc-eg">£110 in 1 year at 10% → worth £100 today</div>
    </div>
    <div class="fc">
      <div class="fc-term">Discounting</div>
      <div class="fc-def">The process of finding present value. The discount rate r reflects opportunity cost — what you could earn elsewhere.</div>
      <div class="fc-eg">Higher r → future money is worth less today</div>
    </div>
    <div class="fc">
      <div class="fc-term">Opportunity cost</div>
      <div class="fc-def">The return you give up by not investing money elsewhere. This is why future cash is less valuable — you've lost the chance to grow today's money.</div>
      <div class="fc-eg">If you can earn 10%, £100 today must grow to £110</div>
    </div>
  </div>

  <div class="sh">The formulas</div>
  <div class="f-label">Future Value — growing money forward in time</div>
  <div class="f-box">FV = PV × (1 + r)ⁿ</div>
  <div class="f-label">Present Value — discounting back to today</div>
  <div class="f-box">PV = FV ÷ (1 + r)ⁿ</div>
  <table class="vt">
    <tr><td>PV</td><td>Present value — the amount of money today</td></tr>
    <tr><td>FV</td><td>Future value — the money at a future point in time</td></tr>
    <tr><td>r</td><td>Interest or discount rate per period (10% = 0.10)</td></tr>
    <tr><td>n</td><td>Number of periods (years, months, quarters...)</td></tr>
  </table>

  <div class="sh">Live calculator</div>
  <div class="calc-block">
    <div class="calc-row">
      <span class="calc-lbl">Present value (£)</span>
      <input type="range" min="100" max="10000" step="100" value="1000" id="t0-pv">
      <span class="calc-out" id="t0-pv-v">£1,000</span>
    </div>
    <div class="calc-row">
      <span class="calc-lbl">Annual rate (%)</span>
      <input type="range" min="1" max="20" step="0.5" value="7" id="t0-r">
      <span class="calc-out" id="t0-r-v">7%</span>
    </div>
    <div class="calc-row">
      <span class="calc-lbl">Years (n)</span>
      <input type="range" min="1" max="30" step="1" value="10" id="t0-n">
      <span class="calc-out" id="t0-n-v">10 yrs</span>
    </div>
    <div class="result-strip">
      <span class="result-label">Future Value</span>
      <span class="result-value" id="t0-result">—</span>
    </div>
  </div>

  <div class="sh">Worked example</div>
  <div class="card-sm white" style="margin-bottom:20px;padding:16px 20px">
    <p style="font-size:13px;color:var(--subtle);line-height:1.7">You invest £5,000 today at 8% per year. How much will you have in 10 years?</p>
    <p style="font-size:13px;color:var(--body);margin-top:8px;font-family:var(--font-mono)">FV = 5,000 × (1.08)¹⁰ = 5,000 × 2.159 = <strong>£10,795</strong></p>
    <p style="font-size:12px;color:var(--subtle);margin-top:6px">You more than doubled your money — purely from the compounding of 8% per year.</p>
  </div>

  <div class="sh">Why quants care</div>
  <div class="qbox">
    <div class="qbox-label">This concept appears everywhere in quant finance</div>
    <p class="qbox-body">TVM is the mathematical skeleton of all of finance. Every time a quant prices a bond, values an option, models a cash flow, or discounts a future payoff — this is the engine running underneath.</p>
    <span class="qtag">Bond pricing</span>
    <span class="qtag">Option pricing</span>
    <span class="qtag">DCF models</span>
    <span class="qtag">Black-Scholes</span>
    <span class="qtag">Risk-neutral valuation</span>
  </div>`
},

/* ── 1  COMPOUNDING METHODS ─────────────────────────── */
{
  title: "Compounding methods",
  eli5: "Compounding means you earn interest on your interest. Think of a snowball rolling downhill — the bigger it gets, the more snow it picks up on each rotation. The more frequently you add interest (monthly instead of yearly), the faster it grows. At the absolute extreme — adding interest every single instant, infinitely fast — you get continuous compounding, the mathematical maximum. This is where the mysterious number 'e ≈ 2.718' comes from.",
  html: `
  <div class="sh">Why compounding frequency matters</div>
  <p style="font-size:14px;color:var(--subtle);line-height:1.7;margin-bottom:18px">If you invest £100 at 12% for one year, the final amount depends on how often interest is applied. More frequent compounding means interest earns interest sooner, leading to a higher final amount.</p>

  <table class="ct">
    <thead>
      <tr><th>Compounding type</th><th>Formula</th><th>£100 at 12%, 1 year</th></tr>
    </thead>
    <tbody>
      <tr><td>Annual (once/yr)</td><td style="font-family:var(--font-mono);font-size:12px">PV(1+r)ⁿ</td><td>£112.00</td></tr>
      <tr><td>Quarterly (4×/yr)</td><td style="font-family:var(--font-mono);font-size:12px">PV(1+r/4)⁴</td><td>£112.55</td></tr>
      <tr><td>Monthly (12×/yr)</td><td style="font-family:var(--font-mono);font-size:12px">PV(1+r/12)¹²</td><td>£112.68</td></tr>
      <tr><td>Daily (365×/yr)</td><td style="font-family:var(--font-mono);font-size:12px">PV(1+r/365)³⁶⁵</td><td>£112.75</td></tr>
      <tr class="highlight"><td>Continuous (∞)</td><td style="font-family:var(--font-mono);font-size:12px">PV × eʳᵗ</td><td>£112.75 ← maximum possible</td></tr>
    </tbody>
  </table>

  <div class="sh">The three key formulas</div>
  <div class="f-label">Annual discrete compounding</div>
  <div class="f-box">FV = PV × (1 + r)ⁿ</div>
  <div class="f-label">Periodic compounding — m times per year</div>
  <div class="f-box">FV = PV × (1 + r/m)^(m×n)</div>
  <div class="f-label">Continuous compounding — the theoretical limit</div>
  <div class="f-box">FV = PV × eʳᵗ</div>
  <table class="vt">
    <tr><td>m</td><td>Compounding periods per year (12 = monthly, 365 = daily)</td></tr>
    <tr><td>e</td><td>Euler's number ≈ 2.71828 — emerges naturally from continuous compounding</td></tr>
    <tr><td>t</td><td>Time in years (same as n in discrete formulas)</td></tr>
  </table>

  <div class="sh">Where does e come from?</div>
  <div class="eli5" style="border-left-color:var(--purple);margin-bottom:20px">
    <div class="eli5-label" style="color:var(--purple)">The deep insight</div>
    As you compound more and more frequently (m → ∞), the formula (1 + r/m)^m converges to a fixed value: Euler's number e ≈ 2.718. So continuous compounding isn't exotic — it's just what happens when you take the natural limit of compounding infinitely often. This is why e appears constantly in finance and physics wherever growth is involved.
  </div>

  <div class="sh">Live comparison calculator</div>
  <div class="calc-block">
    <div class="calc-row">
      <span class="calc-lbl">Principal (£)</span>
      <input type="range" min="100" max="5000" step="100" value="1000" id="t1-pv">
      <span class="calc-out" id="t1-pv-v">£1,000</span>
    </div>
    <div class="calc-row">
      <span class="calc-lbl">Annual rate (%)</span>
      <input type="range" min="1" max="20" step="0.5" value="12" id="t1-r">
      <span class="calc-out" id="t1-r-v">12%</span>
    </div>
    <div class="calc-row">
      <span class="calc-lbl">Years</span>
      <input type="range" min="1" max="20" step="1" value="5" id="t1-n">
      <span class="calc-out" id="t1-n-v">5</span>
    </div>
    <div class="results-3">
      <div class="r3" style="background:#eff6ff">
        <div class="r3-label" style="color:#2563eb">Annual</div>
        <div class="r3-value" style="color:#1e40af" id="t1-ann">—</div>
      </div>
      <div class="r3" style="background:#f5f3ff">
        <div class="r3-label" style="color:#7c3aed">Monthly</div>
        <div class="r3-value" style="color:#5b21b6" id="t1-mon">—</div>
      </div>
      <div class="r3" style="background:#ecfdf5">
        <div class="r3-label" style="color:#059669">Continuous</div>
        <div class="r3-value" style="color:#065f46" id="t1-con">—</div>
      </div>
    </div>
  </div>

  <div class="sh">Why quants love continuous compounding</div>
  <div class="qbox">
    <div class="qbox-label">Critical for quant work</div>
    <p class="qbox-body">Continuous compounding makes the calculus clean — the derivative of eˣ is itself, which is uniquely convenient. Log returns (ln(P₁/P₀)) are the discrete counterpart of continuously compounded returns. Black-Scholes, stochastic calculus, and all continuous-time finance assume this framework.</p>
    <span class="qtag">Log returns</span>
    <span class="qtag">Black-Scholes</span>
    <span class="qtag">Stochastic calculus</span>
    <span class="qtag">GBM (Geometric Brownian Motion)</span>
  </div>`
},

/* ── 2  EAR ─────────────────────────────────────────── */
{
  title: "Effective Annual Rate (EAR)",
  eli5: "Two banks both advertise '10% interest per year'. One adds interest annually, one adds it every month. They sound identical but they're NOT — the monthly one gives you more money, because you start earning interest on your interest sooner. EAR is the single number that converts any rate into 'what do you actually earn over a full year?' — so you can compare them fairly. Without EAR, comparing rates is like comparing apples and oranges.",
  html: `
  <div class="sh">The problem EAR solves</div>
  <div class="fc-grid">
    <div class="fc">
      <div class="fc-term">Nominal rate</div>
      <div class="fc-def">The advertised headline rate. Often misleading — it doesn't tell you how often interest compounds.</div>
      <div class="fc-eg">"10% compounded monthly" — sounds like 10%</div>
    </div>
    <div class="fc">
      <div class="fc-term">Effective rate (EAR)</div>
      <div class="fc-def">The TRUE annual return after accounting for compounding frequency. Always use this to compare investments.</div>
      <div class="fc-eg">10% monthly → EAR = 10.47%</div>
    </div>
    <div class="fc">
      <div class="fc-term">Golden rule</div>
      <div class="fc-def">Never compare nominal rates directly. Convert everything to EAR first. Higher EAR always means better return.</div>
      <div class="fc-eg">12% monthly EAR > 12.5% annual</div>
    </div>
  </div>

  <div class="sh">The formulas</div>
  <div class="f-label">Periodic compounding — m periods per year</div>
  <div class="f-box">EAR = (1 + r/m)^m − 1</div>
  <div class="f-label">Continuous compounding — the limit</div>
  <div class="f-box">EAR = eʳ − 1</div>
  <table class="vt">
    <tr><td>r</td><td>Nominal annual interest rate as a decimal (12% → 0.12)</td></tr>
    <tr><td>m</td><td>Number of compounding periods per year</td></tr>
  </table>

  <div class="sh">Live EAR table — drag the rate</div>
  <div class="calc-block">
    <div class="calc-row">
      <span class="calc-lbl">Nominal rate (%)</span>
      <input type="range" min="1" max="24" step="0.5" value="12" id="t2-r">
      <span class="calc-out" id="t2-r-v">12%</span>
    </div>
  </div>
  <table class="ct">
    <thead><tr><th>Compounding</th><th>Periods / year</th><th>EAR</th></tr></thead>
    <tbody id="t2-tbody"></tbody>
  </table>

  <div class="sh">Worked example</div>
  <div class="card-sm white" style="margin-bottom:20px;padding:16px 20px">
    <p style="font-size:13px;color:var(--subtle);line-height:1.7">Bank A offers 12% compounded annually. Bank B offers 12% compounded monthly. Which is better?</p>
    <p style="font-size:13px;color:var(--body);margin-top:8px;font-family:var(--font-mono)">Bank A EAR = (1 + 0.12)¹ − 1 = <strong>12.00%</strong><br>Bank B EAR = (1 + 0.12/12)¹² − 1 = <strong>12.68%</strong></p>
    <p style="font-size:12px;color:var(--subtle);margin-top:6px">Bank B is better despite the same nominal rate — you earn 0.68% more per year because of more frequent compounding.</p>
  </div>

  <div class="sh">Why quants care</div>
  <div class="qbox">
    <div class="qbox-label">Appears in</div>
    <p class="qbox-body">Quants constantly compare rates across instruments — risk-free rates, bond yields, strategy returns, funding costs. Without EAR, those comparisons are mathematically inconsistent. A strategy returning 8% daily compounded is vastly different from one returning 8% annually — EAR is what makes the comparison honest.</p>
    <span class="qtag">Rate comparison</span>
    <span class="qtag">Bond yield analysis</span>
    <span class="qtag">Strategy performance</span>
    <span class="qtag">Funding cost</span>
  </div>`
},

/* ── 3  NPV ─────────────────────────────────────────── */
{
  title: "Net Present Value (NPV)",
  eli5: "You're thinking about starting a business. You need to spend £10,000 today, and the business will pay you back £3,000 each year for 5 years. Is that a good deal? NPV answers this: it takes every future cash flow, converts it all back to TODAY'S money (using discounting), adds them all up, and subtracts what you paid. If the answer is positive, you made money in real terms. If it's negative, you'd have been better off just investing that £10,000 somewhere else.",
  html: `
  <div class="sh">What NPV measures</div>
  <div class="fc-grid">
    <div class="fc">
      <div class="fc-term">NPV > 0</div>
      <div class="fc-def">The investment creates value. The future cash flows are worth MORE than what you paid, in today's money. Accept the project.</div>
      <div class="fc-eg">NPV of £2,000 → you're £2,000 richer in real terms</div>
    </div>
    <div class="fc">
      <div class="fc-term">NPV = 0</div>
      <div class="fc-def">Break-even. The investment exactly matches your required return. You are indifferent — accept or reject.</div>
      <div class="fc-eg">Just covers the cost of capital</div>
    </div>
    <div class="fc">
      <div class="fc-term">NPV &lt; 0</div>
      <div class="fc-def">The investment destroys value. The future cash flows are worth LESS than what you paid. Reject the project.</div>
      <div class="fc-eg">NPV of −£1,500 → better to invest elsewhere</div>
    </div>
    <div class="fc">
      <div class="fc-term">Discount rate (r)</div>
      <div class="fc-def">The rate used to discount future cash flows. Usually the cost of capital — the return you could earn elsewhere at the same risk level.</div>
      <div class="fc-eg">Higher r → future cash flows are worth less today</div>
    </div>
  </div>

  <div class="sh">The formula</div>
  <div class="f-label">Net Present Value — sum of all discounted cash flows</div>
  <div class="f-box">NPV = −C₀ + CF₁/(1+r) + CF₂/(1+r)² + ... + CFₙ/(1+r)ⁿ</div>
  <div class="f-label">Compact sigma notation</div>
  <div class="f-box">NPV = Σ CFₜ / (1+r)ᵗ   where t = 0 to n</div>
  <table class="vt">
    <tr><td>C₀</td><td>Initial investment (negative cash flow at t=0)</td></tr>
    <tr><td>CFₜ</td><td>Cash flow at time period t (can be positive or negative)</td></tr>
    <tr><td>r</td><td>Discount rate — your required rate of return or cost of capital</td></tr>
    <tr><td>n</td><td>Total number of periods</td></tr>
    <tr><td>t</td><td>Time period index (0, 1, 2, ...n)</td></tr>
  </table>

  <div class="sh">Visualising a cash flow timeline</div>
  <table class="cft">
    <thead><tr><th>Year (t)</th><th>Cash flow</th><th>Discount factor (r=10%)</th><th>Present value</th></tr></thead>
    <tbody>
      <tr class="neg"><td>0 (today)</td><td>−£10,000</td><td>1.000</td><td>−£10,000</td></tr>
      <tr class="pos"><td>1</td><td>+£3,000</td><td>0.909</td><td>+£2,727</td></tr>
      <tr class="pos"><td>2</td><td>+£3,000</td><td>0.826</td><td>+£2,479</td></tr>
      <tr class="pos"><td>3</td><td>+£3,000</td><td>0.751</td><td>+£2,254</td></tr>
      <tr class="pos"><td>4</td><td>+£3,000</td><td>0.683</td><td>+£2,049</td></tr>
      <tr class="pos"><td>5</td><td>+£3,000</td><td>0.621</td><td>+£1,863</td></tr>
      <tr style="font-weight:600"><td colspan="3">NPV</td><td style="color:var(--green)">+£1,372 ✓ Accept</td></tr>
    </tbody>
  </table>

  <div class="sh">Live NPV calculator</div>
  <div class="calc-block">

let cur = 0;

function fmt(n) {
  const abs = Math.abs(Math.round(n));
  const str = '£' + abs.toLocaleString();
  return n < 0 ? '-' + str : str;
}

function go(i) {
  cur = i;
  // sidebar
  document.querySelectorAll('.sb-item').forEach((el, idx) => {
    el.classList.toggle('active', idx === i);
    if (idx < i) el.classList.add('done'); else el.classList.remove('done');
  });
  // render
  const t = T[i];
  document.getElementById('content').innerHTML = `
    <div class="progress-pips" id="pips"></div>
    <div class="topic-eyebrow">
      <span class="tag tag-green">LV I · Topic ${i+1} of ${T.length}</span>
      <span class="tag tag-subtle">Core concept</span>
    </div>
    <div class="topic-title-lg">${t.title}</div>
    <div class="eli5">
      <div class="eli5-label">ELI5 — plain English first</div>
      ${t.eli5}
    </div>
    ${t.html}
    <div style="display:flex;gap:10px;margin-top:32px;padding-top:24px;border-top:0.5px solid var(--light)">
      ${i > 0 ? `<button class="btn" onclick="go(${i-1})">← Previous</button>` : ''}
      ${i < T.length-1 ? `<button class="btn btn-primary" onclick="go(${i+1})" style="margin-left:auto">Next →</button>` : '<span style="font-size:13px;color:var(--subtle);margin-left:auto;align-self:center">LV I complete ✓</span>'}
    </div>`;
  renderPips();
  bindCalcs();
  document.getElementById('content').scrollTop = 0;
  buildDivChart();
}

function renderPips() {
  const el = document.getElementById('pips');
  if (!el) return;
  el.innerHTML = T.map((t,i) => {
    const bg = i === cur ? 'var(--body)' : i < cur ? 'var(--green)' : 'var(--mid)';
    return `<button class="pip" title="${t.title}" style="background:${bg}" onclick="go(${i})"></button>`;
  }).join('');
}

function bindCalcs() {
  const $ = id => document.getElementById(id);

  /* Topic 0 — TVM */
  if ($('t0-pv')) {
    const up = () => {
      const pv = +$('t0-pv').value, r = +$('t0-r').value/100, n = +$('t0-n').value;
      $('t0-pv-v').textContent = '£'+pv.toLocaleString();
      $('t0-r-v').textContent  = $('t0-r').value+'%';
      $('t0-n-v').textContent  = n+' yrs';
      $('t0-result').textContent = fmt(pv * Math.pow(1+r, n));
    };
    [$('t0-pv'),$('t0-r'),$('t0-n')].forEach(e => e.addEventListener('input', up)); up();
  }

  /* Topic 1 — Compounding */
  if ($('t1-pv')) {
    const up = () => {
      const pv = +$('t1-pv').value, r = +$('t1-r').value/100, n = +$('t1-n').value;
      $('t1-pv-v').textContent = '£'+pv.toLocaleString();
      $('t1-r-v').textContent  = $('t1-r').value+'%';
      $('t1-n-v').textContent  = n;
      $('t1-ann').textContent  = fmt(pv * Math.pow(1+r, n));
      $('t1-mon').textContent  = fmt(pv * Math.pow(1+r/12, 12*n));
      $('t1-con').textContent  = fmt(pv * Math.exp(r*n));
    };
    [$('t1-pv'),$('t1-r'),$('t1-n')].forEach(e => e.addEventListener('input', up)); up();
  }

  /* Topic 2 — EAR */
  if ($('t2-r')) {
    const up = () => {
      const r = +$('t2-r').value/100;
      $('t2-r-v').textContent = $('t2-r').value+'%';
      const rows = [{l:'Annually',m:1},{l:'Quarterly',m:4},{l:'Monthly',m:12},{l:'Daily',m:365},{l:'Continuous',m:Infinity}];
      $('t2-tbody').innerHTML = rows.map(row => {
        const ear = row.m===Infinity ? Math.exp(r)-1 : Math.pow(1+r/row.m,row.m)-1;
        return `<tr${row.m===Infinity?' class="highlight"':''}><td>${row.l}</td><td>${row.m===Infinity?'∞':row.m}</td><td>${(ear*100).toFixed(4)}%</td></tr>`;
      }).join('');
    };
    $('t2-r').addEventListener('input', up); up();
  }

  /* Topic 3 — NPV */
  if ($('t3-c0')) {
    const up = () => {
      const c0=+$('t3-c0').value, cf=+$('t3-cf').value, n=+$('t3-n').value, r=+$('t3-r').value/100;
      $('t3-c0-v').textContent='£'+c0.toLocaleString();
      $('t3-cf-v').textContent='£'+cf.toLocaleString();
      $('t3-n-v').textContent=n+' yrs';
      $('t3-r-v').textContent=$('t3-r').value+'%';
      let npv = -c0;
      for(let t=1;t<=n;t++) npv += cf/Math.pow(1+r,t);
      const el = $('t3-result');
      el.textContent = fmt(npv);
      const box = $('t3-result-box');
      if(npv >= 0) {
        box.style.background='var(--green-bg)';
        el.style.color='var(--green-dark)';
        $('t3-label').style.color='var(--green)';
        $('t3-label').textContent='NPV — Accept ✓';
      } else {
        box.style.background='var(--red-bg)';
        el.style.color='var(--red)';
        $('t3-label').style.color='var(--red)';
        $('t3-label').textContent='NPV — Reject ✗';
      }
    };
    [$('t3-c0'),$('t3-cf'),$('t3-n'),$('t3-r')].forEach(e => e.addEventListener('input', up)); up();
  }

  /* Topic 4 — IRR */
  if ($('t4-c0')) {
    const calcIRR = (c0, cf, n) => {
      // Newton-Raphson method
      let r = 0.1;
      for(let iter=0; iter<200; iter++) {
        let npv=-c0, dnpv=0;
        for(let t=1;t<=n;t++){
          npv  += cf/Math.pow(1+r,t);
          dnpv -= t*cf/Math.pow(1+r,t+1);
        }
        if(Math.abs(npv)<0.001) break;
        r = r - npv/dnpv;
        if(r < -0.99) r = -0.99;
      }
      return r;
    };
    const up = () => {
      const c0=+$('t4-c0').value, cf=+$('t4-cf').value, n=+$('t4-n').value;
      $('t4-c0-v').textContent='£'+c0.toLocaleString();
      $('t4-cf-v').textContent='£'+cf.toLocaleString();
      $('t4-n-v').textContent=n+' yrs';
      const irr = calcIRR(c0, cf, n);
      $('t4-result').textContent = (irr*100).toFixed(1)+'%';
    };
    [$('t4-c0'),$('t4-cf'),$('t4-n')].forEach(e => e.addEventListener('input', up)); up();
  }

  /* Topic 5 — Annuities */
  if ($('t5-c')) {
    const up = () => {
      const c=+$('t5-c').value, r=+$('t5-r').value/100, n=+$('t5-n').value;
      $('t5-c-v').textContent='£'+c.toLocaleString();
      $('t5-r-v').textContent=$('t5-r').value+'%';
      $('t5-n-v').textContent=n;
      const pvAnn = c * (1 - Math.pow(1+r,-n)) / r;
      const fvAnn = c * (Math.pow(1+r,n) - 1) / r;
      const pvPerp = c / r;
      $('t5-pv').textContent  = fmt(pvAnn);
      $('t5-fv').textContent  = fmt(fvAnn);
      $('t5-perp').textContent= fmt(pvPerp);
    };
    [$('t5-c'),$('t5-r'),$('t5-n')].forEach(e => e.addEventListener('input', up)); up();
  }
}

function buildDivChart() {
  const el = document.getElementById('div-chart');
  if (!el) return;
  const points = [
    {n:1,r:40},{n:2,r:30},{n:5,r:20},{n:10,r:13},{n:20,r:8},{n:30,r:6},{n:50,r:5}
  ];
  const maxR = 42, w = 340, h = 100;
  let path = `M ${points[0].n/50*w} ${h - points[0].r/maxR*h}`;
  points.forEach(p => { path += ` L ${p.n/50*w} ${h - p.r/maxR*h}`; });
  el.innerHTML = `
  <div style="font-size:11px;color:var(--subtle);margin-bottom:8px">Portfolio risk as you add more stocks</div>
  <svg width="100%" viewBox="0 0 ${w} ${h+20}" style="overflow:visible">
    <line x1="0" y1="${h}" x2="${w}" y2="${h}" stroke="var(--light)" stroke-width="0.5"/>
    <text x="0" y="${h+14}" font-size="9" fill="var(--subtle)">1 stock</text>
    <text x="${w-36}" y="${h+14}" font-size="9" fill="var(--subtle)">50 stocks</text>
    <path d="${path}" fill="none" stroke="var(--red)" stroke-width="1.5"/>
    <line x1="0" y1="${h - 5/maxR*h}" x2="${w}" y2="${h - 5/maxR*h}" stroke="var(--green)" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="${w+4}" y="${h - 5/maxR*h + 4}" font-size="9" fill="var(--green)">Systematic risk (unavoidable)</text>
  </svg>`;
}

/* Init */
go(0);
</script>
